name: Enrich Deleted Data Report With Wayback

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Deleted Data Report
    types:
      - completed

permissions:
  contents: write

jobs:
  enrich-wayback:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      INPUT_CSV_PATH: DELETED_DATA_REPORT/deleted_merged_report.csv
      OUTPUT_CSV_PATH: DELETED_DATA_REPORT/deleted_merged_report_wayback.csv
      WAYBACK_SLEEP_SECONDS: "0.25"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Enrich deleted data report with Wayback data
        run: python DELETED_DATA_REPORT/enrich_wayback_report.py

      - name: Commit updated Wayback report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DELETED_DATA_REPORT/deleted_merged_report_wayback.csv
          if git diff --cached --quiet; then
            echo "No Wayback report changes"
          else
            git commit -m "Update deleted data Wayback report [skip ci]"
            git push
          fi
